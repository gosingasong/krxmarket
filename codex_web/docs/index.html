<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KRX Market Notebook</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="eyebrow">KRX Market</span>
          <h1>Market Notebook</h1>
          <p id="lastUpdated">데이터 로딩 중</p>
        </div>
        <div class="dateTools">
          <button id="todayButton" type="button">Today</button>
          <button id="nextDayButton" type="button">Next day</button>
          <label>
            <span>Calendar</span>
            <input id="dateInput" type="date" />
          </label>
        </div>
      </header>

      <section class="heroGrid">
        <section class="briefPanel">
          <div class="sectionHeader">
            <div>
              <span class="eyebrow">Today Brief</span>
              <h2 id="briefTitle">오늘 요약</h2>
            </div>
            <span id="selectedDateLabel" class="dateBadge">-</span>
          </div>
          <div id="summaryCards" class="summaryCards"></div>
          <div id="quickLists" class="quickLists"></div>
        </section>

        <section class="notePanel">
          <div class="sectionHeader">
            <div>
              <span class="eyebrow">Memo</span>
              <h2>내 메모</h2>
            </div>
          </div>
          <div class="memoStack">
            <div class="memoToolbar" aria-label="Memo sync controls">
              <span>공유 메모: GitHub 저장소 기준으로 모든 기기에서 동일하게 표시</span>
              <div class="memoToolbarActions">
                <button id="memoRefreshButton" class="memoClearButton" type="button">새로고침</button>
                <button id="memoTokenButton" class="memoClearButton" type="button">동기화 토큰</button>
              </div>
            </div>
            <div class="memoBlock">
              <div class="memoHeader"><span>고정 메모</span><button id="clearGlobalMemo" class="memoClearButton" type="button">모두 지우기</button></div>
              <div class="memoEditorWrap">
                <textarea id="globalMemoBox" class="globalMemo" spellcheck="false" placeholder="계속 볼 핵심 원칙, 관심 섹터, 큰 판단을 남겨두세요."></textarea>
                <small id="globalNoteStatus" class="memoSaveStatus">브라우저에 저장</small>
              </div>
            </div>
            <div class="memoBlock">
              <div class="memoHeader"><span>일일 메모</span><button id="clearDailyMemo" class="memoClearButton" type="button">모두 지우기</button></div>
              <div class="memoEditorWrap">
                <textarea id="dailyMemoBox" class="dailyMemo" spellcheck="false" placeholder="오늘 시장에서 볼 것, 장중 체크할 종목을 남겨두세요."></textarea>
                <small id="dailyNoteStatus" class="memoSaveStatus">선택일에 저장</small>
              </div>
            </div>
            <div id="workflowAlert" class="workflowAlert" role="status" aria-live="polite"></div>
          </div>
        </section>
      </section>

      <nav class="jumpNav" aria-label="Sections">
        <a href="#us">미국장</a>
        <a href="#alerts">투자경고</a>
        <a href="#flow">전일 수급</a>
        <a href="#ipo">IPO</a>
        <a href="#sector">업종쏠림</a>
        <a href="#extra">보조 지표</a>
      </nav>

      <section id="us" class="reportSection"></section>
      <section id="alerts" class="reportSection"></section>
      <section id="flow" class="reportSection"></section>
      <section id="ipo" class="reportSection"></section>
      <section id="sector" class="reportSection"></section>
      <section id="extra" class="reportSection"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
