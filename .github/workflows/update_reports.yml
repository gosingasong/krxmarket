name: Update Codex Web Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "codex_web/docs/data/20*/**"
      - "codex_web/docs/data/index.json"
      - "codex_web/docs/data/latest.json"
      - "codex_web/docs/data/workflow_status.json"
      - "codex_web/state/**"
  schedule:
    # UTC cron. KST = UTC+9. Five 3-minute attempts per group; later runs skip fetch if fresh data already exists.
    - cron: "5 21 * * 0-4"  # 06:05 KST, US market + IPO attempt 1/5
    - cron: "8 21 * * 0-4"  # 06:08 KST, US market + IPO attempt 2/5
    - cron: "11 21 * * 0-4" # 06:11 KST, US market + IPO attempt 3/5
    - cron: "14 21 * * 0-4" # 06:14 KST, US market + IPO attempt 4/5
    - cron: "17 21 * * 0-4" # 06:17 KST, US market + IPO attempt 5/5
    - cron: "1 9 * * 1-5"   # 18:01 KST, investor flow attempt 1/5
    - cron: "4 9 * * 1-5"   # 18:04 KST, investor flow attempt 2/5
    - cron: "7 9 * * 1-5"   # 18:07 KST, investor flow attempt 3/5
    - cron: "10 9 * * 1-5"  # 18:10 KST, investor flow attempt 4/5
    - cron: "13 9 * * 1-5"  # 18:13 KST, investor flow attempt 5/5
    - cron: "6 11 * * 1-5"  # 20:06 KST, KRX alert + liquidity / NXT attempt 1/5
    - cron: "9 11 * * 1-5"  # 20:09 KST, KRX alert + liquidity / NXT attempt 2/5
    - cron: "12 11 * * 1-5" # 20:12 KST, KRX alert + liquidity / NXT attempt 3/5
    - cron: "15 11 * * 1-5" # 20:15 KST, KRX alert + liquidity / NXT attempt 4/5
    - cron: "18 11 * * 1-5" # 20:18 KST, KRX alert + liquidity / NXT attempt 5/5
    - cron: "31 9-13 * * 1-5" # 18:31-22:31 KST, stale-data watchdog

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-codex-web-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r codex_web/requirements.txt

      - name: Restore generated data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            codex_web/docs/data
            codex_web/state
          key: krxmarket-generated-data-${{ github.run_id }}
          restore-keys: |
            krxmarket-generated-data-

      - name: Generate JSON reports
        id: generate
        continue-on-error: true
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          kst_today() {
            TZ=Asia/Seoul date +%F
          }
          krx_prev_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          sessions = TradingDayCalendar().krx_sessions
          today = pd.Timestamp(sys.argv[1])
          pos = sessions.searchsorted(today)
          if pos < len(sessions) and sessions[pos].date() == today.date():
              pos -= 1
          else:
              pos -= 1
          if pos < 0:
              raise SystemExit("No previous KRX session found")
          print(sessions[pos].date().isoformat())
          PY
          }
          krx_next_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          next_day = TradingDayCalendar().add_krx_trading_days(pd.Timestamp(sys.argv[1]), 1)
          if next_day is None:
              raise SystemExit("No next KRX session found")
          print(next_day.date().isoformat())
          PY
          }
          retry_group() {
            NAME="$1"
            shift
            for attempt in 1 2 3 4 5; do
              echo "[$NAME] fetch attempt $attempt/5"
              if "$@"; then
                echo "[$NAME] fetch succeeded on attempt $attempt; stopping retries"
                return 0
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "[$NAME] fetch failed on attempt $attempt; retrying in 3 minutes"
                sleep 180
              fi
            done
            echo "[$NAME] fetch failed after 5 attempts"
            return 1
          }
          group_is_fresh() {
            GROUP="$1"
            BASE_DATE="$2"
            WINDOW_START="$3"
            PYTHONPATH=codex_web/src python - "$GROUP" "$BASE_DATE" "$WINDOW_START" <<'PY'
          import datetime as dt
          import json
          import sys
          from pathlib import Path

          import pandas as pd

          from codex_web.sources.common import KST, TradingDayCalendar

          group, base_date, window_start = sys.argv[1:]
          data_root = Path("codex_web/docs/data")
          calendar = TradingDayCalendar()
          next_date = calendar.add_krx_trading_days(pd.Timestamp(base_date), 1)
          next_date_str = next_date.date().isoformat() if next_date is not None else None
          min_generated_at = dt.datetime.fromisoformat(f"{base_date}T{window_start}:00").replace(tzinfo=KST)

          def generated_after_window(payload):
              value = payload.get("generated_at")
              if not value:
                  return False
              try:
                  generated = dt.datetime.fromisoformat(str(value).replace("Z", "+00:00"))
              except ValueError:
                  return False
              if generated.tzinfo is None:
                  generated = generated.replace(tzinfo=KST)
              return generated.astimezone(KST) >= min_generated_at

          def report_ok(date_str, report_name):
              path = data_root / date_str / f"{report_name}.json"
              if not path.exists():
                  print(f"missing {path}")
                  return False
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"cannot read {path}: {exc}")
                  return False
              if payload.get("status") != "ok":
                  print(f"{path} status={payload.get('status')}")
                  return False
              if not generated_after_window(payload):
                  print(f"{path} generated_at is older than {min_generated_at.isoformat()}")
                  return False
              if report_name == "investor_flow":
                  summary = payload.get("summary") or {}
                  if int(summary.get("institution_count") or 0) <= 0 and int(summary.get("foreigner_count") or 0) <= 0:
                      print(f"{path} has empty investor flow rows")
                      return False
              return True

          if group == "morning_us_ipo":
              checks = [(base_date, "us_market"), (base_date, "ipo")]
              if next_date_str:
                  checks.append((next_date_str, "ipo"))
          elif group == "investor_flow":
              checks = [(base_date, "investor_flow")]
              if next_date_str:
                  checks.append((next_date_str, "investor_flow"))
          elif group == "risk_auxiliary":
              checks = [(base_date, "krx_alert"), (base_date, "liquidity"), (base_date, "nxt_market")]
              if next_date_str:
                  checks.extend((next_date_str, report) for report in ["krx_alert", "liquidity", "nxt_market"])
          else:
              print(f"unknown group {group}")
              raise SystemExit(1)

          if all(report_ok(date_str, report_name) for date_str, report_name in checks):
              print(f"{group} is already fresh for {base_date}")
              raise SystemExit(0)
          raise SystemExit(1)
          PY
          }
          run_group_once_if_stale() {
            GROUP="$1"
            WINDOW_START="$2"
            BASE_DATE="$3"
            shift 3
            if group_is_fresh "$GROUP" "$BASE_DATE" "$WINDOW_START"; then
              echo "[$GROUP] fresh data already exists; skipping this scheduled attempt"
              return 0
            fi
            echo "[$GROUP] fresh data missing; running scheduled fetch attempt"
            "$@" "$BASE_DATE"
          }
          refresh_ipo_today_and_next() {
            BASE_DATE="$1"
            NEXT_DATE=$(krx_next_session "$BASE_DATE")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports ipo --fail-fast --verbose
            python codex_web/update_reports.py --date "$NEXT_DATE" --reports ipo --fail-fast --verbose
          }
          refresh_morning_us_ipo() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports us_market --fail-fast --verbose
            refresh_ipo_today_and_next "$BASE_DATE"
          }
          refresh_investor_flow() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports investor_flow --flow-source-date "$BASE_DATE" --flow-rollover-next --fail-fast --verbose
          }
          refresh_risk_and_auxiliary() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --fail-fast --verbose
            python codex_web/update_reports.py --date "$BASE_DATE" --reports liquidity,nxt_market --extra-rollover-next --fail-fast --verbose
          }
          run_staleness_watchdog() {
            BASE_DATE="$1"
            HOUR_KST=$(TZ=Asia/Seoul date +%H)
            STATUS=0
            if [ "$HOUR_KST" -ge 6 ]; then
              run_group_once_if_stale morning_us_ipo 06:05 "$BASE_DATE" refresh_morning_us_ipo || STATUS=1
            fi
            if [ "$HOUR_KST" -ge 18 ]; then
              run_group_once_if_stale investor_flow 18:01 "$BASE_DATE" refresh_investor_flow || STATUS=1
            fi
            if [ "$HOUR_KST" -ge 20 ]; then
              run_group_once_if_stale risk_auxiliary 20:06 "$BASE_DATE" refresh_risk_and_auxiliary || STATUS=1
            fi
            return "$STATUS"
          }

          REPORTS="default"
          if [ "$EVENT_NAME" = "push" ]; then
            TODAY_KST=$(kst_today)
            BASE_DATE=$(krx_prev_session "$TODAY_KST")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --fail-fast --verbose
            HOUR_KST=$(TZ=Asia/Seoul date +%H)
            if [ "$HOUR_KST" -ge 6 ]; then
              retry_group morning_us_ipo refresh_morning_us_ipo "$TODAY_KST"
            fi
            if [ "$HOUR_KST" -ge 18 ]; then
              retry_group investor_flow refresh_investor_flow "$TODAY_KST"
            fi
            if [ "$HOUR_KST" -ge 20 ]; then
              retry_group risk_auxiliary refresh_risk_and_auxiliary "$TODAY_KST"
            fi
            exit 0
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "5 21 * * 0-4"|"8 21 * * 0-4"|"11 21 * * 0-4"|"14 21 * * 0-4"|"17 21 * * 0-4") REPORTS="morning_us_ipo" ;;
              "1 9 * * 1-5"|"4 9 * * 1-5"|"7 9 * * 1-5"|"10 9 * * 1-5"|"13 9 * * 1-5") REPORTS="investor_flow" ;;
              "6 11 * * 1-5"|"9 11 * * 1-5"|"12 11 * * 1-5"|"15 11 * * 1-5"|"18 11 * * 1-5") REPORTS="risk_auxiliary" ;;
              "31 9-13 * * 1-5") REPORTS="stale_watchdog" ;;
            esac
          fi
          BASE_DATE=$(kst_today)
          case "$REPORTS" in
            morning_us_ipo)
              run_group_once_if_stale morning_us_ipo 06:05 "$BASE_DATE" refresh_morning_us_ipo
              ;;
            investor_flow)
              run_group_once_if_stale investor_flow 18:01 "$BASE_DATE" refresh_investor_flow
              ;;
            risk_auxiliary)
              run_group_once_if_stale risk_auxiliary 20:06 "$BASE_DATE" refresh_risk_and_auxiliary
              ;;
            stale_watchdog)
              run_staleness_watchdog "$BASE_DATE"
              ;;
            default)
              python codex_web/update_reports.py --reports default --fail-fast --verbose
              ;;
            *)
              echo "Unknown report group: $REPORTS"
              exit 1
              ;;
          esac

      - name: Record workflow status
        if: always()
        env:
          GENERATE_OUTCOME: ${{ steps.generate.outcome }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          KST = dt.timezone(dt.timedelta(hours=9), name="KST")
          failed = os.environ.get("GENERATE_OUTCOME") == "failure"
          payload = {
              "schema_version": 1,
              "failed": failed,
              "message": "Generate JSON reports step failed" if failed else "OK",
              "run_id": os.environ.get("RUN_ID"),
              "run_url": os.environ.get("RUN_URL"),
              "generated_at": dt.datetime.now(KST).isoformat(),
          }
          path = Path("codex_web/docs/data/workflow_status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Save generated data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            codex_web/docs/data
            codex_web/state
          key: krxmarket-generated-data-${{ github.run_id }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: codex_web/docs

      - uses: actions/deploy-pages@v4

      - name: Fail workflow if report generation failed
        if: steps.generate.outcome == 'failure'
        run: exit 1
