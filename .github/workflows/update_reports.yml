name: Update Codex Web Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # UTC cron. KST = UTC+9.
    - cron: "30 21 * * 0-4" # 06:30 KST, US market
    - cron: "39 21 * * 0-4" # 06:39 KST, US market retry
    - cron: "50 21 * * 0-4" # 06:50 KST, US market retry
    - cron: "20 6 * * 1-5"  # 15:20 KST, IPO
    - cron: "40 6 * * 1-5"  # 15:40 KST, IPO retry
    - cron: "0 7 * * 1-5"   # 16:00 KST, IPO retry
    - cron: "1 9 * * 1-5"   # 18:01 KST, investor flow
    - cron: "20 9 * * 1-5"  # 18:20 KST, investor flow retry
    - cron: "40 9 * * 1-5"  # 18:40 KST, investor flow retry
    - cron: "10 11 * * 1-5" # 20:10 KST, liquidity / NXT
    - cron: "30 11 * * 1-5" # 20:30 KST, liquidity / NXT retry
    - cron: "50 11 * * 1-5" # 20:50 KST, liquidity / NXT retry
    - cron: "25 11 * * 1-5" # 20:25 KST, KRX alert
    - cron: "45 11 * * 1-5" # 20:45 KST, KRX alert retry
    - cron: "5 12 * * 1-5"  # 21:05 KST, KRX alert retry
    - cron: "25 12 * * 1-5" # 21:25 KST, KRX alert retry
    - cron: "45 12 * * 1-5" # 21:45 KST, KRX alert retry
    - cron: "5 13 * * 1-5"  # 22:05 KST, all KRX evening catch-up

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r codex_web/requirements.txt

      - name: Generate JSON reports
        id: generate
        continue-on-error: true
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          kst_today() {
            TZ=Asia/Seoul date +%F
          }
          krx_prev_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          sessions = TradingDayCalendar().krx_sessions
          today = pd.Timestamp(sys.argv[1])
          pos = sessions.searchsorted(today)
          if pos < len(sessions) and sessions[pos].date() == today.date():
              pos -= 1
          else:
              pos -= 1
          if pos < 0:
              raise SystemExit("No previous KRX session found")
          print(sessions[pos].date().isoformat())
          PY
          }
          krx_next_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          next_day = TradingDayCalendar().add_krx_trading_days(pd.Timestamp(sys.argv[1]), 1)
          if next_day is None:
              raise SystemExit("No next KRX session found")
          print(next_day.date().isoformat())
          PY
          }
          refresh_ipo_today_and_next() {
            BASE_DATE="$1"
            NEXT_DATE=$(krx_next_session "$BASE_DATE")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports ipo --verbose
            python codex_web/update_reports.py --date "$NEXT_DATE" --reports ipo --verbose
          }
          refresh_evening_krx() {
            BASE_DATE="$1"
            refresh_ipo_today_and_next "$BASE_DATE"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports investor_flow --flow-source-date "$BASE_DATE" --flow-rollover-next --verbose
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --verbose
            python codex_web/update_reports.py --date "$BASE_DATE" --reports liquidity,nxt_market --extra-rollover-next --verbose
          }

          REPORTS="default"
          if [ "$EVENT_NAME" = "push" ]; then
            TODAY_KST=$(kst_today)
            BASE_DATE=$(krx_prev_session "$TODAY_KST")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --verbose
            HOUR_KST=$(TZ=Asia/Seoul date +%H)
            if [ "$HOUR_KST" -ge 15 ]; then
              refresh_ipo_today_and_next "$TODAY_KST"
            fi
            if [ "$HOUR_KST" -ge 18 ]; then
              python codex_web/update_reports.py --date "$TODAY_KST" --reports investor_flow --flow-source-date "$TODAY_KST" --flow-rollover-next --verbose
            fi
            if [ "$HOUR_KST" -ge 20 ]; then
              python codex_web/update_reports.py --date "$TODAY_KST" --reports krx_alert --risk-rollover-next --verbose
              python codex_web/update_reports.py --date "$TODAY_KST" --reports liquidity,nxt_market --extra-rollover-next --verbose
            fi
            exit 0
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "30 21 * * 0-4"|"39 21 * * 0-4"|"50 21 * * 0-4") REPORTS="us_market" ;;
              "20 6 * * 1-5"|"40 6 * * 1-5"|"0 7 * * 1-5") REPORTS="ipo" ;;
              "1 9 * * 1-5"|"20 9 * * 1-5"|"40 9 * * 1-5") REPORTS="investor_flow" ;;
              "10 11 * * 1-5"|"30 11 * * 1-5"|"50 11 * * 1-5") REPORTS="liquidity,nxt_market" ;;
              "25 11 * * 1-5"|"45 11 * * 1-5"|"5 12 * * 1-5"|"25 12 * * 1-5"|"45 12 * * 1-5") REPORTS="krx_alert" ;;
              "5 13 * * 1-5") REPORTS="evening_krx" ;;
            esac
          fi
          if [ "$EVENT_NAME" = "schedule" ] && [ "$REPORTS" = "evening_krx" ]; then
            BASE_DATE=$(kst_today)
            refresh_evening_krx "$BASE_DATE"
            exit 0
          fi
          if [ "$EVENT_NAME" = "schedule" ] && [ "$REPORTS" = "ipo" ]; then
            BASE_DATE=$(kst_today)
            refresh_ipo_today_and_next "$BASE_DATE"
            exit 0
          fi
          DATE_ARGS=""
          FLOW_ARGS=""
          RISK_ARGS=""
          EXTRA_ARGS=""
          if [ "$EVENT_NAME" = "schedule" ] && [ "$REPORTS" = "investor_flow" ]; then
            BASE_DATE=$(kst_today)
            DATE_ARGS="--date $BASE_DATE"
            FLOW_ARGS="--flow-source-date $BASE_DATE --flow-rollover-next"
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$REPORTS" = "liquidity,nxt_market" ]; then
            BASE_DATE=$(kst_today)
            DATE_ARGS="--date $BASE_DATE"
            EXTRA_ARGS="--extra-rollover-next"
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$REPORTS" = "krx_alert" ]; then
            BASE_DATE=$(kst_today)
            DATE_ARGS="--date $BASE_DATE"
            RISK_ARGS="--risk-rollover-next"
          fi
          python codex_web/update_reports.py $DATE_ARGS $FLOW_ARGS $RISK_ARGS $EXTRA_ARGS --reports "$REPORTS" --verbose

      - name: Record workflow status
        if: always()
        env:
          GENERATE_OUTCOME: ${{ steps.generate.outcome }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          KST = dt.timezone(dt.timedelta(hours=9), name="KST")
          failed = os.environ.get("GENERATE_OUTCOME") == "failure"
          payload = {
              "schema_version": 1,
              "failed": failed,
              "message": "Generate JSON reports step failed" if failed else "OK",
              "run_id": os.environ.get("RUN_ID"),
              "run_url": os.environ.get("RUN_URL"),
              "generated_at": dt.datetime.now(KST).isoformat(),
          }
          path = Path("codex_web/docs/data/workflow_status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex_web/docs/data codex_web/state || true
          git diff --cached --quiet || git commit -m "Update Codex Web data"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: codex_web/docs

      - uses: actions/deploy-pages@v4

      - name: Fail workflow if report generation failed
        if: steps.generate.outcome == 'failure'
        run: exit 1
