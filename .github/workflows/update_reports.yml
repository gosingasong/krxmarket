name: Update Codex Web Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # UTC cron. KST = UTC+9.
    - cron: "59 21 * * 0-4" # 06:59 KST, US market
    - cron: "20 6 * * 1-5"  # 15:20 KST, IPO
    - cron: "1 9 * * 1-5"   # 18:01 KST, investor flow
    - cron: "10 11 * * 1-5" # 20:10 KST, liquidity / NXT
    - cron: "25 11 * * 1-5" # 20:25 KST, KRX alert

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r codex_web/requirements.txt

      - name: Generate JSON reports
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          REPORTS="default"
          if [ "$EVENT_NAME" = "push" ]; then
            echo "Push event: deploy site code with the committed data snapshot."
            exit 0
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "59 21 * * 0-4") REPORTS="us_market" ;;
              "20 6 * * 1-5") REPORTS="ipo" ;;
              "1 9 * * 1-5") REPORTS="investor_flow" ;;
              "10 11 * * 1-5") REPORTS="liquidity,nxt_market" ;;
              "25 11 * * 1-5") REPORTS="krx_alert" ;;
            esac
          fi
          python codex_web/update_reports.py --reports "$REPORTS" --verbose

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex_web/docs/data codex_web/state || true
          git diff --cached --quiet || git commit -m "Update Codex Web data"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: codex_web/docs

      - uses: actions/deploy-pages@v4
