name: Update Codex Web Data

on:
  workflow_dispatch:
  schedule:
    - cron: "40 20 * * 1-5"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r codex_web/requirements.txt

      - name: Generate JSON reports
        run: |
          python codex_web/update_reports.py --reports default --verbose

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex_web/docs/data codex_web/state || true
          git diff --cached --quiet || git commit -m "Update Codex Web data"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: codex_web/docs

      - uses: actions/deploy-pages@v4
