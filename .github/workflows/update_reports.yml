name: Update Codex Web Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # UTC cron. KST = UTC+9. Each scheduled run retries internally 5 times at 3-minute intervals.
    - cron: "5 21 * * 0-4"  # 06:05 KST, US market + IPO
    - cron: "1 9 * * 1-5"   # 18:01 KST, investor flow
    - cron: "3 11 * * 1-5"  # 20:03 KST, KRX alert + liquidity / NXT

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r codex_web/requirements.txt

      - name: Generate JSON reports
        id: generate
        continue-on-error: true
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          kst_today() {
            TZ=Asia/Seoul date +%F
          }
          krx_prev_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          sessions = TradingDayCalendar().krx_sessions
          today = pd.Timestamp(sys.argv[1])
          pos = sessions.searchsorted(today)
          if pos < len(sessions) and sessions[pos].date() == today.date():
              pos -= 1
          else:
              pos -= 1
          if pos < 0:
              raise SystemExit("No previous KRX session found")
          print(sessions[pos].date().isoformat())
          PY
          }
          krx_next_session() {
            PYTHONPATH=codex_web/src python - "$1" <<'PY'
          import pandas as pd
          import sys
          from codex_web.sources.common import TradingDayCalendar
          next_day = TradingDayCalendar().add_krx_trading_days(pd.Timestamp(sys.argv[1]), 1)
          if next_day is None:
              raise SystemExit("No next KRX session found")
          print(next_day.date().isoformat())
          PY
          }
          retry_group() {
            NAME="$1"
            shift
            for attempt in 1 2 3 4 5; do
              echo "[$NAME] fetch attempt $attempt/5"
              if "$@"; then
                echo "[$NAME] fetch succeeded on attempt $attempt; stopping retries"
                return 0
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "[$NAME] fetch failed on attempt $attempt; retrying in 3 minutes"
                sleep 180
              fi
            done
            echo "[$NAME] fetch failed after 5 attempts"
            return 1
          }
          refresh_ipo_today_and_next() {
            BASE_DATE="$1"
            NEXT_DATE=$(krx_next_session "$BASE_DATE")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports ipo --fail-fast --verbose
            python codex_web/update_reports.py --date "$NEXT_DATE" --reports ipo --fail-fast --verbose
          }
          refresh_morning_us_ipo() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports us_market --fail-fast --verbose
            refresh_ipo_today_and_next "$BASE_DATE"
          }
          refresh_investor_flow() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports investor_flow --flow-source-date "$BASE_DATE" --flow-rollover-next --fail-fast --verbose
          }
          refresh_risk_and_auxiliary() {
            BASE_DATE="$1"
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --fail-fast --verbose
            python codex_web/update_reports.py --date "$BASE_DATE" --reports liquidity,nxt_market --extra-rollover-next --fail-fast --verbose
          }

          REPORTS="default"
          if [ "$EVENT_NAME" = "push" ]; then
            TODAY_KST=$(kst_today)
            BASE_DATE=$(krx_prev_session "$TODAY_KST")
            python codex_web/update_reports.py --date "$BASE_DATE" --reports krx_alert --risk-rollover-next --fail-fast --verbose
            HOUR_KST=$(TZ=Asia/Seoul date +%H)
            if [ "$HOUR_KST" -ge 6 ]; then
              retry_group morning_us_ipo refresh_morning_us_ipo "$TODAY_KST"
            fi
            if [ "$HOUR_KST" -ge 18 ]; then
              retry_group investor_flow refresh_investor_flow "$TODAY_KST"
            fi
            if [ "$HOUR_KST" -ge 20 ]; then
              retry_group risk_auxiliary refresh_risk_and_auxiliary "$TODAY_KST"
            fi
            exit 0
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "5 21 * * 0-4") REPORTS="morning_us_ipo" ;;
              "1 9 * * 1-5") REPORTS="investor_flow" ;;
              "3 11 * * 1-5") REPORTS="risk_auxiliary" ;;
            esac
          fi
          BASE_DATE=$(kst_today)
          case "$REPORTS" in
            morning_us_ipo)
              retry_group morning_us_ipo refresh_morning_us_ipo "$BASE_DATE"
              ;;
            investor_flow)
              retry_group investor_flow refresh_investor_flow "$BASE_DATE"
              ;;
            risk_auxiliary)
              retry_group risk_auxiliary refresh_risk_and_auxiliary "$BASE_DATE"
              ;;
            default)
              python codex_web/update_reports.py --reports default --fail-fast --verbose
              ;;
            *)
              echo "Unknown report group: $REPORTS"
              exit 1
              ;;
          esac

      - name: Record workflow status
        if: always()
        env:
          GENERATE_OUTCOME: ${{ steps.generate.outcome }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          KST = dt.timezone(dt.timedelta(hours=9), name="KST")
          failed = os.environ.get("GENERATE_OUTCOME") == "failure"
          payload = {
              "schema_version": 1,
              "failed": failed,
              "message": "Generate JSON reports step failed" if failed else "OK",
              "run_id": os.environ.get("RUN_ID"),
              "run_url": os.environ.get("RUN_URL"),
              "generated_at": dt.datetime.now(KST).isoformat(),
          }
          path = Path("codex_web/docs/data/workflow_status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex_web/docs/data codex_web/state || true
          git diff --cached --quiet || git commit -m "Update Codex Web data"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: codex_web/docs

      - uses: actions/deploy-pages@v4

      - name: Fail workflow if report generation failed
        if: steps.generate.outcome == 'failure'
        run: exit 1
